name: Build and Push Firefox ESR

on:
  push:
    branches: [main]
    paths-ignore: ['.firefox-esr-version']
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC
  workflow_dispatch:

env:
  IMAGE_NAME: firefox-esr

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      needs_build: ${{ steps.decide.outputs.needs_build }}
      version: ${{ steps.decide.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Decide whether to build
        id: decide
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            # Code change — always rebuild
            echo "needs_build=true" >> $GITHUB_OUTPUT
            echo "version=" >> $GITHUB_OUTPUT
          else
            # Scheduled/manual — only build if new Firefox ESR version in PPA
            RAW=$(curl -sL https://ppa.launchpadcontent.net/mozillateam/ppa/ubuntu/dists/noble/main/binary-amd64/Packages.gz \
              | gunzip | grep -A 7 -m 1 'Package: firefox-esr' | awk -F ': ' '/Version/{print $2;exit}')
            if [ -z "$RAW" ]; then
              echo "::error::Could not retrieve Firefox ESR version from PPA"
              exit 1
            fi
            CLEAN=$(echo "$RAW" | grep -oP '\d+\.\d+(\.\d+)?' | head -1)
            if [ -z "$CLEAN" ]; then
              echo "::error::Could not parse version from PPA string: ${RAW}"
              exit 1
            fi
            LAST=$(cat .firefox-esr-version 2>/dev/null || echo "none")
            echo "Last built: ${LAST} | Available: ${CLEAN}"
            echo "version=${CLEAN}" >> $GITHUB_OUTPUT
            if [ "$LAST" = "$CLEAN" ]; then
              echo "needs_build=false" >> $GITHUB_OUTPUT
            else
              echo "needs_build=true" >> $GITHUB_OUTPUT
            fi
          fi

  build:
    needs: check
    if: needs.check.outputs.needs_build == 'true'
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set platform pair
        run: echo "PLATFORM_PAIR=${{ matrix.platform == 'linux/amd64' && 'linux-amd64' || 'linux-arm64' }}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=${{ env.PLATFORM_PAIR }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    needs: [check, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create and push multi-platform manifest
        run: |
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}"
          VERSION="${{ needs.check.outputs.version }}"
          TAGS="-t ${IMAGE}:latest"
          if [ -n "$VERSION" ]; then
            TAGS="$TAGS -t ${IMAGE}:${VERSION}"
          fi
          docker buildx imagetools create $TAGS \
            $(printf "${IMAGE}@sha256:%s " $(ls /tmp/digests))

      - name: Record built version
        if: needs.check.outputs.version != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "${{ needs.check.outputs.version }}" > .firefox-esr-version
          git add .firefox-esr-version
          git commit -m "chore: built firefox-esr ${{ needs.check.outputs.version }}"
          git push origin main
