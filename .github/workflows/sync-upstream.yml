name: Check Firefox ESR and Build

on:
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC
  workflow_dispatch:

env:
  IMAGE_NAME: firefox-esr

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get latest Firefox ESR version from Mozilla PPA
        id: version
        run: |
          RAW=$(curl -sL https://ppa.launchpadcontent.net/mozillateam/ppa/ubuntu/dists/noble/main/binary-amd64/Packages.gz \
            | gunzip \
            | grep -A 7 -m 1 'Package: firefox-esr' \
            | awk -F ': ' '/Version/{print $2;exit}')

          if [ -z "$RAW" ]; then
            echo "::error::Could not retrieve Firefox ESR version from PPA"
            exit 1
          fi

          # Extract clean version: handles both 115.0esr and 140.10.0esr formats
          CLEAN=$(echo "$RAW" | grep -oP '\d+\.\d+(\.\d+)?' | head -1)
          if [ -z "$CLEAN" ]; then
            echo "::error::Could not parse version from PPA string: ${RAW}"
            exit 1
          fi
          echo "raw=${RAW}" >> $GITHUB_OUTPUT
          echo "version=${CLEAN}" >> $GITHUB_OUTPUT
          echo "Firefox ESR latest: ${CLEAN} (raw: ${RAW})"

      - name: Check if already built this version
        id: check
        run: |
          LAST=$(cat .firefox-esr-version 2>/dev/null || echo "none")
          CURRENT="${{ steps.version.outputs.version }}"
          echo "Last built: ${LAST} | Available: ${CURRENT}"
          if [ "$LAST" = "$CURRENT" ]; then
            echo "needs_build=false" >> $GITHUB_OUTPUT
          else
            echo "needs_build=true" >> $GITHUB_OUTPUT
          fi

      - name: Set up QEMU
        if: steps.check.outputs.needs_build == 'true'
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        if: steps.check.outputs.needs_build == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        if: steps.check.outputs.needs_build == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        if: steps.check.outputs.needs_build == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Record built version
        if: steps.check.outputs.needs_build == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "${{ steps.version.outputs.version }}" > .firefox-esr-version
          git add .firefox-esr-version
          git commit -m "chore: built firefox-esr ${{ steps.version.outputs.version }}"
          git push origin main
